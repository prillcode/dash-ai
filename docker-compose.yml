services:
  dash-ai:
    build:
      context: .
      args:
        VITE_API_TOKEN: ${VITE_API_TOKEN}
    image: dash-ai:latest
    ports:
      # Host:Container mapping. If PORT is set in the repo-root .env (for example PORT=3210),
      # Docker publishes host port 3210 to container port 3000. If PORT is not set, it defaults to 3000.
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # The app listens on port 3000 inside the container; only the host-side published port is variable.
      PORT: 3000
      DEPLOYMENT_MODE: docker
      PROJECTS_ROOT: /projects
      # SQLite database path inside the container. This lives on the /data volume mounted below.
      SQLITE_DB_PATH: /data/dashboard.db
    volumes:
      # Named Docker volume for persistent app data. The SQLite DB is stored at /data/dashboard.db in the
      # container and survives container recreation because /data is backed by the dash-ai-data volume.
      - dash-ai-data:/data
      # Optional: mount Pi auth + skills for full planning/coding support inside the container
      - ${HOME}/.pi:/root/.pi:ro
      - ${HOME}/.agents:/root/.agents:ro
      # Mount host development repos so Dash-AI in Docker can read/write project files.
      # Register projects using container paths like /projects/my-repo.
      - ${HOME}/dev:/projects
    restart: unless-stopped

volumes:
  dash-ai-data:
    # Docker-managed named volume used to persist the SQLite DB and other /data contents.
